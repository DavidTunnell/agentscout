<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AgentScout — Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/app.css" />
</head>
<body>
  <header>
    <h1>AgentScout</h1>
    <nav>
      <a href="index.html">Status</a>
      <a href="review.html">Recommendations</a>
      <a href="inspector.html">Inspector</a>
      <a href="settings.html" class="active">Settings</a>
    </nav>
  </header>

  <main>
    <section id="capability-banner" hidden>
      <h2>Platform notice</h2>
      <p id="capability-text" class="muted"></p>
    </section>

    <section>
      <h2>Cost projection</h2>
      <div id="cost-body" class="muted">Loading...</div>
    </section>

    <section>
      <h2>Capture</h2>
      <form id="capture-form">
        <label>
          Cadence (minutes between captures)
          <select name="cadence_minutes">
            <option value="3">3 min</option>
            <option value="5">5 min</option>
            <option value="10">10 min</option>
            <option value="15">15 min</option>
          </select>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" name="budget_mode" />
          Budget mode (OCR + thumbnail instead of full image — cheaper, less context)
        </label>
        <label>
          Idle threshold (minutes)
          <input type="number" name="idle_threshold_minutes" min="1" max="60" />
        </label>
      </form>
    </section>

    <section>
      <h2>Analysis</h2>
      <form id="analysis-form">
        <label>
          Cluster summarization model
          <select name="model_cluster_summary">
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (default)</option>
            <option value="claude-haiku-4-5">Claude Haiku 4.5 (cheaper)</option>
          </select>
        </label>
        <label>
          Synthesis model
          <select name="model_synthesis">
            <option value="claude-opus-4-7">Claude Opus 4.7 (default)</option>
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (cheaper)</option>
          </select>
        </label>
        <label>
          Active hours threshold (analysis runs after this many active hours)
          <input type="number" name="active_hours_threshold" min="1" max="168" />
        </label>
        <label>
          Cost ceiling per cycle (USD)
          <input type="number" name="cost_ceiling_per_cycle_usd" min="0.10" max="100" step="0.10" />
        </label>
        <label>
          Confidence threshold (recommendations below this are suppressed)
          <input type="number" name="confidence_suppression_threshold" min="0" max="1" step="0.05" />
        </label>
      </form>
    </section>

    <div class="actions">
      <button id="save-btn">Save changes</button>
      <span id="save-status" class="muted"></span>
    </div>

    <section>
      <h2>Storage location</h2>
      <p class="muted">
        AgentScout stores configuration, the SQLite metadata DB, and
        AES-GCM-encrypted screenshots in your platform data directory.
      </p>
      <div id="config-path-hint"></div>
    </section>
  </main>

  <script type="module" src="assets/settings.js"></script>
</body>
</html>
