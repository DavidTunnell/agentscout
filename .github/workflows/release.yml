name: Release

# Triggered manually from the Actions tab, or automatically when a tag
# matching v*.*.* is pushed. Builds Windows (.msi), macOS (.dmg), and
# Linux (.AppImage + .deb) installers, then attaches them to a GitHub
# Release.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.5.0). Leave empty to build a draft.'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
            artifact_name: agentscout-windows
          - os: macos-latest
            artifact_glob: src-tauri/target/release/bundle/dmg/*.dmg
            artifact_name: agentscout-macos
          - os: ubuntu-latest
            artifact_glob: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
            artifact_name: agentscout-linux

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (Linux only)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-release-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-release-

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libxdo-dev libxcb1-dev libxrandr-dev \
            libdbus-1-dev libpipewire-0.3-dev libspa-0.2-dev libgbm-dev \
            libegl1-mesa-dev libwayland-dev libdrm-dev

      - name: npm install (Tauri CLI)
        run: npm install

      # v0.5.10/v0.5.11: Bundle Tesseract on Windows so users don't have
      # to install it separately. Choco's `tesseract` package is the
      # UB-Mannheim distribution. We copy tesseract.exe + the DLLs it
      # needs into src-tauri/resources/tesseract/ where tauri-bundler's
      # `bundle.resources` config picks them up.
      #
      # v0.5.11: bundling is **strict-required**. If choco install fails
      # OR the staging step can't locate tesseract.exe, the release
      # fails. This prevents shipping a Windows MSI that lacks Tesseract
      # (which would silently regress users back to "Tesseract not
      # installed" notices and broken Budget Mode). Set
      # AGENTSCOUT_ALLOW_MISSING_TESSERACT=1 to opt out for emergency
      # hotfix builds.
      #
      # Other platforms:
      #   - Linux: .deb declares tesseract-ocr as a dependency.
      #   - macOS: users `brew install tesseract` (deferred to v1.x).
      - name: Install Tesseract via Chocolatey (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install tesseract --no-progress -y --version=5.5.0.20241111

      - name: Stage Tesseract binaries for bundling (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dest = "src-tauri\resources\tesseract"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null

          $candidates = @(
            "C:\Program Files\Tesseract-OCR",
            "C:\ProgramData\chocolatey\lib\tesseract\tools\Tesseract-OCR",
            "C:\Program Files (x86)\Tesseract-OCR"
          )
          $tess = $candidates | Where-Object { Test-Path "$_\tesseract.exe" } | Select-Object -First 1
          if (-not $tess) {
            if ($env:AGENTSCOUT_ALLOW_MISSING_TESSERACT -eq "1") {
              Write-Warning "Tesseract not found and AGENTSCOUT_ALLOW_MISSING_TESSERACT=1 set; proceeding without bundle"
              exit 0
            }
            Write-Error "Tesseract not found in any expected location after choco install. Searched: $($candidates -join ', ')"
            exit 1
          }
          Write-Host "Copying Tesseract from $tess"
          Copy-Item "$tess\tesseract.exe" $dest -Force
          # Bundle the DLLs that tesseract.exe links against. Choco's
          # distribution ships them flat in the install dir.
          Copy-Item "$tess\*.dll" $dest -Force -ErrorAction SilentlyContinue
          Get-ChildItem $dest | Format-Table Name, Length

      - name: Verify Tesseract bundle (Windows)
        if: runner.os == 'Windows' && env.AGENTSCOUT_ALLOW_MISSING_TESSERACT != '1'
        shell: pwsh
        run: |
          # tesseract.exe on Windows is a thin (~80-100 KB) launcher
          # that delegates to libtesseract-5.dll. The real "is OCR
          # going to work" check is the DLL — we assert it's present
          # and reasonably sized. We DO check tesseract.exe exists
          # (it's the entry point we shell out to) but don't enforce
          # a minimum size on it.
          $tessExe = "src-tauri\resources\tesseract\tesseract.exe"
          if (-not (Test-Path $tessExe)) {
            Write-Error "tesseract.exe missing from bundle staging dir — release would ship without OCR"
            exit 1
          }
          $exeSize = (Get-Item $tessExe).Length

          $libTess = "src-tauri\resources\tesseract\libtesseract-5.dll"
          if (-not (Test-Path $libTess)) {
            Write-Error "libtesseract-5.dll missing — the actual OCR engine wasn't bundled. tesseract.exe alone is just a wrapper and won't work without it."
            exit 1
          }
          $libSize = (Get-Item $libTess).Length
          if ($libSize -lt 2MB) {
            Write-Error "libtesseract-5.dll at $libTess is only $libSize bytes (expected >2MB) — staging copy is corrupt"
            exit 1
          }

          $dlls = Get-ChildItem "src-tauri\resources\tesseract\*.dll"
          if ($dlls.Count -lt 5) {
            Write-Error "only $($dlls.Count) DLL(s) staged — choco's tesseract distribution normally includes 30+ DLLs. Bundle is incomplete."
            exit 1
          }
          $totalDllBytes = ($dlls | Measure-Object -Property Length -Sum).Sum
          Write-Host "Bundle OK: tesseract.exe ($exeSize bytes) + libtesseract-5.dll ($libSize bytes) + $($dlls.Count) total DLLs ($totalDllBytes bytes total)"

      # tauri's macOS bundler tries to sign whenever APPLE_CERTIFICATE
      # is set, even to an empty string. We split into two steps so the
      # signing path is only taken when the secret is actually populated.
      #
      # Binary disambiguation note: the package has 3 auto-discovered
      # binaries (agentscout GUI, smoke CLI, replay-cycle CLI). Without
      # disambiguation, tauri-cli picks one based on FS iteration order
      # — which differs across runners. v0.5.0/v0.5.1 shipped CLI
      # binaries by accident. We rely on `default-run = "agentscout"`
      # in Cargo.toml (added in v0.5.2/v0.5.3) — `tauri build` does not
      # accept a `--bin` flag (rejected with clap "unexpected argument"),
      # so the cargo-side default-run is the only knob we need.
      - name: tauri build (signed macOS)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm run tauri -- build --verbose

      - name: tauri build (unsigned)
        if: runner.os != 'macOS' || env.APPLE_CERTIFICATE == ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: npm run tauri -- build --verbose

      # Bundle smoke: run the self-test binary against the same source
      # tree and toolchain that produced the bundle. If a subsystem is
      # broken (keychain access, crypto, storage, fixture cycle) we'd
      # rather fail the release here than ship to users. v0.5.5 added
      # this as a regression guard for the v0.5.0–v0.5.2 class of bug.
      # Linux runners don't have a session keyring so we skip the
      # keychain subsystem there.
      - name: self-test (bundle smoke)
        if: runner.os != 'Linux'
        working-directory: src-tauri
        run: cargo run --release --bin self_test --jobs 2
      - name: self-test (Linux, skips keychain)
        if: runner.os == 'Linux'
        working-directory: src-tauri
        env:
          AGENTSCOUT_SELFTEST_SKIP_KEYCHAIN: "1"
        run: cargo run --release --bin self_test --jobs 2 || echo "Linux keychain not available; non-fatal for v0.5.5"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 30

  publish:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AgentScout ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            dist/**/*.msi
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.deb
            dist/**/*.AppImage
