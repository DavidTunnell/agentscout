name: Release

# Triggered manually from the Actions tab, or automatically when a tag
# matching v*.*.* is pushed. Builds Windows (.msi), macOS (.dmg), and
# Linux (.AppImage + .deb) installers, then attaches them to a GitHub
# Release.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.5.0). Leave empty to build a draft.'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
            artifact_name: agentscout-windows
          - os: macos-latest
            artifact_glob: src-tauri/target/release/bundle/dmg/*.dmg
            artifact_name: agentscout-macos
          - os: ubuntu-latest
            artifact_glob: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
            artifact_name: agentscout-linux

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (Linux only)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-release-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-release-

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libxdo-dev libxcb1-dev libxrandr-dev \
            libdbus-1-dev libpipewire-0.3-dev libspa-0.2-dev libgbm-dev \
            libegl1-mesa-dev libwayland-dev libdrm-dev

      - name: npm install (Tauri CLI)
        run: npm install

      # tauri's macOS bundler tries to sign whenever APPLE_CERTIFICATE
      # is set, even to an empty string. We split into two steps so the
      # signing path is only taken when the secret is actually populated.
      #
      # Binary disambiguation note: the package has 3 auto-discovered
      # binaries (agentscout GUI, smoke CLI, replay-cycle CLI). Without
      # disambiguation, tauri-cli picks one based on FS iteration order
      # — which differs across runners. v0.5.0/v0.5.1 shipped CLI
      # binaries by accident. We rely on `default-run = "agentscout"`
      # in Cargo.toml (added in v0.5.2/v0.5.3) — `tauri build` does not
      # accept a `--bin` flag (rejected with clap "unexpected argument"),
      # so the cargo-side default-run is the only knob we need.
      - name: tauri build (signed macOS)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm run tauri -- build --verbose

      - name: tauri build (unsigned)
        if: runner.os != 'macOS' || env.APPLE_CERTIFICATE == ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: npm run tauri -- build --verbose

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 30

  publish:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AgentScout ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            dist/**/*.msi
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.deb
            dist/**/*.AppImage
